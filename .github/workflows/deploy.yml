    branches: [main]
    paths-ignore:
      - 'README.md'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: jackowfish/server-utilities/.github/workflows/build-image.yml@master
    with:
      image: ghcr.io/jackowfish/mafia
    secrets: inherit
